<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../site/assets/css/site.css">
  <style>
    html, body { margin: 0; }
    .card { width: 1280px; height: 640px; box-sizing: border-box; padding: 96px; display: flex; flex-direction: column; justify-content: space-between; background: var(--night); border: 2px solid var(--line); }
    .card h1 { font-size: 76px; margin: 0; max-width: 20ch; }
    .card .kicker { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.16em; color: var(--accent); font-size: 22px; }
    .card .foot { font-family: var(--font-mono); color: var(--muted); font-size: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <p class="kicker">Source available for noncommercial use</p>
    <h1>A self-hosted AI journal that reads across years of your writing.</h1>
    <p class="foot">github.com/sinmentis/unflincher</p>
  </div>
</body>
</html>
