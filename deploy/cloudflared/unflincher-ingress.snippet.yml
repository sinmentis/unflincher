# deploy/cloudflared/unflincher-ingress.snippet.yml
# unflincher cloudflared ingress — MERGE this ONE block into your own cloudflared config.yml.
# Place it ABOVE the final `- service: http_status:404` catch-all.
#
#   PRIVATE hostname — it MUST be paired with the Access application created by
#   create-access-unflincher-app.sh below. unflincher has no login of its own; Access is the
#   only thing standing between the internet and the owner's private diary.
#
# localhost:8096 is unflincher.container's PublishPort.
  - hostname: unflincher.yourdomain.com
    service: http://localhost:8096
