# deploy/cloudflared/diary-ingress.snippet.yml
# diary cloudflared ingress — MERGE this ONE block into ~/.cloudflared/config.yml (owned by
# shunlyu-infra). Place it ABOVE the final `- service: http_status:404` catch-all.
#
#   PRIVATE hostname — it MUST be paired with the Access application created by
#   create-access-diary-app.sh below. diary has no login of its own; Access is the only
#   thing standing between the internet and the owner's private diary.
#
# localhost:8096 is diary.container's PublishPort (Task 19).
  - hostname: diary.yourdomain.com
    service: http://localhost:8096
