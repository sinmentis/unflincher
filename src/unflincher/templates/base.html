<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#11100f">
  <meta name="description" content="{{ t('meta.description') }}">
  <title>{% block title %}{{ t("nav.title") }}{% endblock %}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/theme.css" data-legacy-theme>
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/shell.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/pages.css">
  <script id="ui-messages" type="application/json">{{ {
    "streamInterrupted": t("app_js.stream_interrupted"),
    "working": t("common.working"),
    "busy": t("common.busy_alert"),
    "requestFailed": t("common.request_failed"),
    "titleRequired": t("chat_sidebar.title_required")
  } | tojson }}</script>
  <script src="/static/vendor/htmx.min.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body data-page="{{ page_id }}">
  <script src="/static/app.js"></script>
  {% include "partials/icon_sprite.html" %}
  <a class="skip-link" href="#main-content">{{ t("shell.skip_to_content") }}</a>
  {% include "partials/command_navigation.html" %}
  <main id="main-content" class="page-shell" tabindex="-1">
    {% block content %}{% endblock %}
  </main>
  <footer class="app-footer">
    <span>UNFLINCHER</span>
    <span>{{ current_nav_label }}</span>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
