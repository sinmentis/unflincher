<!-- src/unflincher/templates/new_entry.html -->
{% extends "base.html" %}
{% block nav_new %}active{% endblock %}
{% block content %}
<h1>{{ t("new_entry.heading") }}</h1>
<p class="entry-date">{{ t("new_entry.autosave_hint") }} <span id="draft-status" class="entry-date"></span></p>
<p><label for="new-date">{{ t("new_entry.date_label") }}</label>
  <input type="date" id="new-date" aria-label="{{ t('new_entry.date_aria') }}">
</p>
<p><input type="text" id="new-title" placeholder="{{ t('new_entry.title_placeholder') }}" aria-label="{{ t('new_entry.title_placeholder') }}" style="width:100%;padding:8px"></p>
<p><textarea id="new-content" placeholder="{{ t('new_entry.content_placeholder') }}" aria-label="{{ t('new_entry.content_aria') }}" style="width:100%;min-height:220px;padding:8px"></textarea></p>
<button id="save-entry" class="btn-primary">{{ t("new_entry.save_button") }}</button>
<script>
(() => {
  // Local (browser) "today", not UTC -- matches how someone judges "today" while writing late at
  // night, per the design spec. toISOString() would give the UTC date instead, which can be off
  // by a day; build the YYYY-MM-DD string from the local getFullYear/Month/Date fields instead.
  const now = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  const todayLocal = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
  const dateInput = document.getElementById("new-date");
  dateInput.value = todayLocal;
  dateInput.max = todayLocal;

  // Restore a saved draft, if there is one -- including overriding the date field's own "today"
  // default above, since the draft is a more specific, more recent signal of intent. See
  // docs/superpowers/specs/2026-07-10-diary-new-entry-draft-autosave-design.md.
  const titleInput = document.getElementById("new-title");
  const contentInput = document.getElementById("new-content");
  const draftStatus = document.getElementById("draft-status");
  const draft = loadDraft(window.localStorage);
  if (draft) {
    if (draft.date) dateInput.value = draft.date;
    titleInput.value = draft.title || "";
    contentInput.value = draft.content || "";
    draftStatus.textContent = {{ t("new_entry.draft_saved") | tojson }};
  }

  // Debounced autosave: any input on date/title/content schedules a write 500ms after the last
  // keystroke, so a burst of typing doesn't hit localStorage on every character.
  let saveTimer = null;
  const scheduleSave = () => {
    draftStatus.textContent = {{ t("new_entry.draft_saving") | tojson }};
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      saveDraft(window.localStorage, {
        date: dateInput.value, title: titleInput.value, content: contentInput.value,
      });
      draftStatus.textContent = {{ t("new_entry.draft_saved") | tojson }};
    }, 500);
  };
  dateInput.addEventListener("input", scheduleSave);
  titleInput.addEventListener("input", scheduleSave);
  contentInput.addEventListener("input", scheduleSave);
})();
document.getElementById("save-entry").addEventListener("click", async () => {
  const res = await fetch("/new", {
    method: "POST", headers: {"Content-Type": "application/json", "X-CSRF-Token": getCsrfToken()},
    body: JSON.stringify({
      title: document.getElementById("new-title").value,
      content: document.getElementById("new-content").value,
      entry_date: document.getElementById("new-date").value,
    }),
  });
  if (!res.ok) {
    // A validation error (e.g. malformed/future entry_date) still returns a JSON body
    // ({"detail": "..."}) that res.json() would happily parse, so this MUST be gated on res.ok,
    // not just "did parsing succeed" -- otherwise the draft is wiped and the user is redirected
    // to a nonexistent /entry/undefined despite their entry never having been saved.
    alert({{ t("new_entry.save_failed_alert") | tojson }});
    return;
  }
  const {entry_id} = await res.json();
  clearDraft(window.localStorage);
  window.location.href = `/entry/${entry_id}`;
});
</script>
{% endblock %}
