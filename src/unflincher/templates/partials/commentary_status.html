<section class="generation-state" id="commentary-status" data-state="running"
         role="status" aria-live="polite"
         hx-get="/entry/{{ entry_id }}/commentary-status"
         hx-trigger="load, every 3s" hx-swap="outerHTML">
  <span class="status-mark" data-status="generating">
    <span class="status-glyph" aria-hidden="true"></span>
    <span>{{ t("commentary_status.generating") }}</span>
  </span>
</section>
