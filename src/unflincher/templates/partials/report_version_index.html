<nav class="report-version-index" aria-label="{{ t('report.timeline_aria') }}">
  <ol>
    {% for version in versions %}
    <li data-status="{{ version.status }}">
      <a href="/report/{{ version.id }}"
         {% if version.id == viewing_version_id %}aria-current="true"{% endif %}>
        <span>V{{ "%02d" % (versions|length - loop.index0) }}</span>
        <time>{{ version.created_at[:10] }}</time>
        <span>
          {{ t("report.failed_badge") if version.status == "failed" else version.covered_entry_count }}
        </span>
      </a>
    </li>
    {% endfor %}
  </ol>
</nav>
