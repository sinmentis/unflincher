{# destructive_confirmation.html:
   confirmation_id, title, body, confirm_label, cancel_label #}
<section id="{{ confirmation_id }}" class="confirmation" hidden aria-live="polite">
  <h3 data-confirmation-title>{{ title }}</h3>
  <p data-confirmation-body>{{ body }}</p>
  <div class="confirmation-actions">
    <button type="button" class="button button--danger" data-confirm>{{ confirm_label }}</button>
    <button type="button" class="button" data-cancel>{{ cancel_label }}</button>
  </div>
</section>
