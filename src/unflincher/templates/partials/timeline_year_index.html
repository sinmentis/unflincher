<div class="timeline-year-index" data-role="year-filter">
  <nav aria-label="{{ t('timeline.filter_by_year_aria') }}">
    <button type="button" class="year-chip is-active" data-year-clear
            aria-pressed="true" disabled>
      <span>{{ t("timeline.all_years") }}</span>
    </button>
    {% for year in years %}
    <button type="button" class="year-chip" data-year-link="{{ year.year }}"
            data-year-count="{{ year.count }}" aria-pressed="false">
      <span>{{ year.year }}</span>
      <b>{{ year.count }}</b>
    </button>
    {% endfor %}
  </nav>
</div>
