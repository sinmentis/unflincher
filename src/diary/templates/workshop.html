<!-- src/diary/templates/workshop.html -->
{% extends "base.html" %}
{% block nav_workshop %}active{% endblock %}
{% block content %}
<h1>Prompt 设置</h1>

<section class="ws-section">
  <div class="ai-label">人设 Prompt</div>
  <textarea id="prompt-draft" aria-label="Persona prompt 内容" style="width:100%;min-height:280px;padding:10px;font-family:var(--font-mono)">{{ active_prompt }}</textarea>

  <p><label for="model-select">生成用的模型：</label>
    <select id="model-select" aria-label="生成用的模型">
      {% for mid, mname in models %}<option value="{{ mid }}"{% if mid == active_model %} selected{% endif %}>{{ mname }}</option>{% endfor %}
    </select>
  </p>
</section>

<section class="ws-section">
  <div class="ai-label">Test Run 预览 · 不会保存</div>
  <p><label for="test-entry">挑一篇日记试试上面这版草稿：</label>
    <select id="test-entry">
      {% for e in entries %}<option value="{{ e.id }}">{{ e.title }}</option>{% endfor %}
    </select>
    <button id="run-test">Test Run</button>
  </p>
  <div class="ai-card" id="preview-stream" style="display:none" aria-live="polite"></div>
</section>

<section class="ws-section">
  <div class="ai-label">保存 / 批量重新生成</div>
  <p class="entry-date">"应用"只保存这版 prompt 和模型；"应用并对全部历史日记+报告重新生成"会用它重新点评全部日记，成本和耗时高得多。</p>
  <button id="apply-btn" class="btn-primary">应用</button>
  <button id="apply-all-btn" class="btn-danger">应用并对全部历史日记+报告重新生成</button>
  <div id="regen-progress-holder"></div>
</section>

<script src="/static/app.js"></script>
<script>
document.getElementById("run-test").addEventListener("click", () => {
  const target = document.getElementById("preview-stream");
  streamInto("/workshop/test-run", {
    draft_prompt: document.getElementById("prompt-draft").value,
    entry_id: parseInt(document.getElementById("test-entry").value, 10),
    model: document.getElementById("model-select").value,
  }, target);
});
document.getElementById("apply-btn").addEventListener("click", async () => {
  await fetch("/workshop/apply", {
    method: "POST", headers: {"Content-Type": "application/json", "X-CSRF-Token": getCsrfToken()},
    body: JSON.stringify({
      draft_prompt: document.getElementById("prompt-draft").value,
      model: document.getElementById("model-select").value,
    }),
  });
  location.reload();
});
document.getElementById("apply-all-btn").addEventListener("click", async () => {
  const res = await fetch("/workshop/apply-all", {method: "POST", headers: {"X-CSRF-Token": getCsrfToken()}});
  if (res.status === 409) { alert("已经有一个批量任务在跑，请等它结束。"); return; }
  const {job_id} = await res.json();
  const holder = document.getElementById("regen-progress-holder");
  holder.innerHTML = `<div id="regen-progress" hx-get="/workshop/jobs/${job_id}/progress" hx-trigger="load, every 2s" hx-swap="outerHTML"></div>`;
  htmx.process(holder);
});
</script>
{% endblock %}
