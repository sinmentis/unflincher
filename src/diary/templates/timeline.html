<!-- src/diary/templates/timeline.html -->
{% extends "base.html" %}
{% block nav_timeline %}active{% endblock %}
{% block content %}
<h1>时间线</h1>
{% for entry in entries %}
<div class="entry-row">
  <div class="entry-date">{{ entry.entry_date[:10] }}</div>
  <div style="flex:1">
    <p class="entry-title"><a href="/entry/{{ entry.id }}">{{ entry.title }}</a></p>
  </div>
  {% if entry.has_commentary %}
    <span class="badge done">AI 已点评</span>
  {% else %}
    <span class="badge pending">未点评</span>
  {% endif %}
</div>
{% endfor %}
{% endblock %}
