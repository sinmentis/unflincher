<!-- src/diary/templates/partials/chat_sidebar.html -->
<nav class="side-nav side-nav--sessions" aria-label="{{ t('chat_sidebar.aria') }}">
  <a href="/chat/new" class="side-nav-item side-nav-new">{{ t("chat_sidebar.new") }}</a>
  {% for s in sessions %}
  <div class="side-nav-session{{ ' active' if active_session_id == s.id else '' }}">
    <a href="/chat/{{ s.id }}" class="side-nav-item side-nav-session-link">{{ s.title }}</a>
    <button type="button" class="side-nav-session-action" data-rename-session="{{ s.id }}" title="{{ t('chat_sidebar.rename_title') }}">✎</button>
    <button type="button" class="side-nav-session-action" data-delete-session="{{ s.id }}" title="{{ t('chat_sidebar.delete_title') }}">🗑</button>
  </div>
  {% endfor %}
</nav>
<script>
document.querySelectorAll("[data-rename-session]").forEach((btn) => {
  btn.addEventListener("click", async () => {
    const id = btn.dataset.renameSession;
    const title = prompt({{ t("chat_sidebar.rename_prompt") | tojson }});
    if (!title) return;
    await fetch(`/chat/${id}/rename`, {
      method: "POST",
      headers: {"Content-Type": "application/json", "X-CSRF-Token": getCsrfToken()},
      body: JSON.stringify({title}),
    });
    location.reload();
  });
});
document.querySelectorAll("[data-delete-session]").forEach((btn) => {
  btn.addEventListener("click", async () => {
    const id = btn.dataset.deleteSession;
    if (!confirm({{ t("chat_sidebar.delete_confirm") | tojson }})) return;
    await fetch(`/chat/${id}/delete`, {
      method: "POST",
      headers: {"X-CSRF-Token": getCsrfToken()},
    });
    window.location.href = "/chat";
  });
});
</script>
