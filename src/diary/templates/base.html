<!-- src/diary/templates/base.html -->
<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}{{ t("nav.title") }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/theme.css">
  <script src="/static/vendor/htmx.min.js"></script>
</head>
<body>
  <nav class="nav">
    <a href="/" class="{% block nav_timeline %}{% endblock %}">{{ t("nav.timeline") }}</a>
    <a href="/report" class="{% block nav_report %}{% endblock %}">{{ t("nav.report") }}</a>
    <a href="/chat" class="{% block nav_chat %}{% endblock %}">{{ t("nav.chat") }}</a>
    <a href="/new" class="{% block nav_new %}{% endblock %}">{{ t("nav.new_entry") }}</a>
    <a href="/workshop" class="{% block nav_workshop %}{% endblock %}">{{ t("nav.workshop") }}</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
